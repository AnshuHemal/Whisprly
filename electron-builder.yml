appId: ai.whisprly.app
productName: Whisprly
copyright: Copyright © 2026 Whisprly.ai

# ─── Directories ──────────────────────────────────────────────────────────
directories:
  output: dist
  buildResources: build

# ─── Files to include in the package ──────────────────────────────────────
files:
  - dist-electron/**/*
  - package.json
  - "!node_modules/**/*"
  - "!src/**/*"
  - "!prisma/**/*"
  - "!electron/**/*"
  - "!.next/**/*"
  - "!public/**/*"

# ─── Extra resources bundled alongside the app ────────────────────────────
# (none needed — app loads Next.js from the web server)

# ─── Windows ──────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]
  # icon: build/icon.ico   ← uncomment and add a 256x256 .ico file to build/

nsis:
  oneClick: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Whisprly

# ─── macOS ────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false

# ─── Linux ────────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Office
